    // 格式化日期 YYYYMMDD -> YYYY-MM-DD
    function fmtDate(d) {
        return d.substring(0,4) + '-' + d.substring(4,6) + '-' + d.substring(6,8);
    }

    // 格式化数字
    function fmtNum(v, decimals=2) {
        return Number(v).toFixed(decimals);
    }

    // 涨跌颜色（A股：红涨绿跌）
    function priceColor(change) {
        if (change > 0) return '#ef4444';
        if (change < 0) return '#22c55e';
        return '#888';
    }

    // ===== 计算统计指标 =====
    const last = rawData[rawData.length - 1];
    const first = rawData[0];
    const high52 = Math.max(...rawData.map(d => d.high));
    const low52 = Math.min(...rawData.map(d => d.low));
    const totalVol = rawData.reduce((s, d) => s + d.vol, 0);
    const totalAmount = rawData.reduce((s, d) => s + d.amount, 0);
    const yearChange = last.close - first.close;
    const yearPctChg = ((yearChange / first.close) * 100).toFixed(2);
    const avgVol = (totalVol / rawData.length / 100).toFixed(0); // 手

    const stats = [
        { label: '最新收盘价', value: fmtNum(last.close), sub: fmtDate(last.trade_date),
          cls: last.change >= 0 ? 'red' : 'green' },
        { label: '当日涨跌', value: (last.change >= 0 ? '+' : '') + fmtNum(last.change),
          sub: (last.pct_chg >= 0 ? '+' : '') + fmtNum(last.pct_chg) + '%',
          cls: last.change >= 0 ? 'red' : 'green' },
        { label: '近一年涨跌', value: (yearChange >= 0 ? '+' : '') + fmtNum(yearChange),
          sub: (yearPctChg >= 0 ? '+' : '') + yearPctChg + '%',
          cls: yearChange >= 0 ? 'red' : 'green' },
        { label: '52周最高', value: fmtNum(high52), sub: '¥', cls: 'red' },
        { label: '52周最低', value: fmtNum(low52), sub: '¥', cls: 'green' },
        { label: '日均成交量', value: avgVol, sub: '手', cls: 'neutral' },
        { label: '总成交额', value: (totalAmount / 100000).toFixed(1), sub: '亿元', cls: 'neutral' },
        { label: '交易天数', value: rawData.length, sub: '天', cls: 'neutral' },
    ];

    const statsBar = document.getElementById('stats-bar');
    stats.forEach(s => {

        div.className = 'stat-item';
        div.innerHTML = `
            <div class="stat-label">${s.label}</div>
            <div class="stat-value ${s.cls}">${s.value}</div>
            <div class="stat-sub">${s.sub}</div>
        `;

    });

    // ===== ECharts K线 + 交易量 =====

    const dates = rawData.map(d => fmtDate(d.trade_date));
    // ECharts candlestick: [open, close, low, high]
    const ohlc = rawData.map(d => [d.open, d.close, d.low, d.high]);
    const vols = rawData.map(d => d.vol);
    // 交易量颜色：涨红跌绿
    const volColors = rawData.map(d => d.close >= d.open ? '#ef4444' : '#22c55e');

    // MA5 / MA20 / MA60
    function calcMA(data, n) {
        const result = [];
        for (let i = 0; i < data.length; i++) {
            if (i < n - 1) { result.push('-'); continue; }
            let sum = 0;
            for (let j = 0; j < n; j++) sum += data[i - j].close;
            result.push((sum / n).toFixed(2));
        }
        return result;
    }
    const ma5 = calcMA(rawData, 5);
    const ma20 = calcMA(rawData, 20);
    const ma60 = calcMA(rawData, 60);
